<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
@page { size: 1600px 2560px; margin: 0; }
html, body { margin: 0; padding: 0; }
body {
  width: 1600px; height: 2560px;
  background: #020617;
  color: #f1f5f9;
  font-family: Helvetica, Arial, sans-serif;
  position: relative;
}
.glow {
  position: absolute; top: 0; left: 0; right: 0; height: 1200px;
  background: linear-gradient(180deg, rgba(59, 130, 246, 0.12) 0%, rgba(2, 6, 23, 0) 100%);
}
.frame {
  position: absolute; top: 60px; left: 60px; right: 60px; bottom: 60px;
  border: 3px solid rgba(245, 158, 11, 0.55);
}
.inner { position: absolute; top: 0; left: 0; right: 0; bottom: 0; padding: 140px 120px; box-sizing: border-box; }
.kicker {
  font-family: Menlo, monospace; font-size: 32px; letter-spacing: 14px;
  color: #3b82f6; margin-top: 50px; text-align: center;
}
.title { margin-top: 330px; text-align: center; font-weight: 900; }
.title .l1 { display: block; font-size: 138px; letter-spacing: 6px; color: #f1f5f9; }
.title .l2 { display: block; font-size: 84px; color: #94a3b8; margin: 26px 0; font-weight: 400; letter-spacing: 44px; }
.title .l3 { display: block; font-size: 138px; letter-spacing: 2px; color: #f59e0b; }
.rule { width: 320px; height: 6px; background: #f59e0b; margin: 90px auto; }
.subtitle {
  font-size: 44px; line-height: 1.55; color: #94a3b8; text-align: center;
  max-width: 1100px; margin: 0 auto; font-weight: 400;
}
.author {
  position: absolute; bottom: 170px; left: 0; right: 0; text-align: center;
  font-size: 52px; letter-spacing: 10px; color: #f1f5f9; font-weight: 700;
}
.draft {
  position: absolute; bottom: 95px; left: 0; right: 0; text-align: center;
  font-family: Menlo, monospace; font-size: 26px; letter-spacing: 8px; color: #3b82f6;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="frame"></div>
<div class="inner">
  <div class="kicker">A FIELD MANUAL FOR THE EXPONENTIAL AGE</div>
  <div class="title">
    <span class="l1">SURVIVING</span>
    <span class="l2">THE</span>
    <span class="l3">SINGULARITY</span>
  </div>
  <div class="rule"></div>
  <div class="subtitle">Staying agentic while AI rewrites work, money, medicine, and meaning</div>
  <div class="author">CHRISTOPHER TAVOLAZZI</div>
  <div class="draft">DRAFT EDITION</div>
</div>
</body>
</html>
