<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <defs>
    <marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="858" height="518" rx="12" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="52" font-size="15" letter-spacing="3" fill="#94a3b8">THE CNC AUTONOMOUS BED</text>
  <text x="40" y="74" font-size="12" fill="#64748b">FarmBot-style gantry over a dense coordinate-planted bed</text>
  <line x1="40" y1="88" x2="360" y2="88" stroke="#1e293b" stroke-width="2"/>

  <!-- bed frame -->
  <rect x="110" y="150" width="640" height="280" rx="6" fill="#0f172a" stroke="#334155" stroke-width="2"/>

  <!-- X rails -->
  <rect x="110" y="150" width="640" height="14" fill="#1e293b"/>
  <rect x="110" y="416" width="640" height="14" fill="#1e293b"/>
  <text x="430" y="140" font-size="12" fill="#3b82f6" text-anchor="middle">gantry travels the X-axis on V-slot rails →</text>

  <!-- gantry beam (Y) -->
  <rect x="430" y="150" width="16" height="280" fill="#f59e0b" opacity="0.9"/>
  <!-- tool head -->
  <rect x="414" y="270" width="48" height="40" rx="5" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="438" y="295" font-size="11" fill="#f59e0b" text-anchor="middle">Z</text>
  <line x1="438" y1="310" x2="438" y2="336" stroke="#f59e0b" stroke-width="2" marker-end="url(#aa)"/>
  <text x="512" y="250" font-size="11" fill="#94a3b8" text-anchor="middle">tool head (Z-axis):</text>
  <text x="512" y="266" font-size="11" fill="#94a3b8" text-anchor="middle">seed · water · weed</text>

  <!-- plant coordinates -->
  <g text-anchor="middle">
    <circle cx="200" cy="230" r="14" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="200" y="264" font-size="11" fill="#f1f5f9">carrot</text>
    <text x="200" y="280" font-size="10" fill="#64748b">(120, 80)</text>

    <circle cx="300" cy="360" r="14" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="300" y="394" font-size="11" fill="#f1f5f9">lettuce</text>
    <text x="300" y="410" font-size="10" fill="#64748b">(240, 200)</text>

    <circle cx="560" cy="220" r="14" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="560" y="254" font-size="11" fill="#f1f5f9">radish</text>
    <text x="560" y="270" font-size="10" fill="#64748b">(360, 70)</text>

    <circle cx="670" cy="360" r="14" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="670" y="394" font-size="11" fill="#f1f5f9">clover cover</text>
    <text x="670" y="410" font-size="10" fill="#64748b">(480, 200)</text>
  </g>

  <text x="430" y="470" font-size="13" fill="#f1f5f9" text-anchor="middle">every plant is an X-Y coordinate; no walking paths, no wasted bed</text>
  <text x="430" y="496" font-size="12" fill="#64748b" text-anchor="middle">tool heads: vacuum seed injector · root-dose nozzle · OpenCV rotary weeder</text>
</svg>
