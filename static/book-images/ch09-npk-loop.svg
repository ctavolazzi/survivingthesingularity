<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <defs>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#64748b"/>
    </marker>
    <marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="858" height="598" rx="12" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="52" font-size="15" letter-spacing="3" fill="#94a3b8">THE DESTRUCTIVE NPK FEEDBACK LOOP</text>
  <line x1="40" y1="66" x2="460" y2="66" stroke="#1e293b" stroke-width="2"/>

  <rect x="230" y="96" width="400" height="64" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="430" y="123" font-size="15" font-weight="600" fill="#94a3b8" text-anchor="middle">APPLY SYNTHETIC NPK</text>
  <text x="430" y="145" font-size="11" fill="#64748b" text-anchor="middle">fossil fuel energy, stabilized in salt</text>

  <line x1="430" y1="160" x2="430" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="230" y="206" width="400" height="64" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="430" y="233" font-size="15" font-weight="600" fill="#94a3b8" text-anchor="middle">SALTS KILL NATIVE SOIL BIOLOGY</text>
  <text x="430" y="255" font-size="11" fill="#64748b" text-anchor="middle">fungi and bacteria die first</text>

  <line x1="430" y1="270" x2="430" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="230" y="316" width="400" height="64" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="430" y="343" font-size="15" font-weight="600" fill="#94a3b8" text-anchor="middle">SOIL COLLAPSES INTO STERILE DIRT</text>
  <text x="430" y="365" font-size="11" fill="#64748b" text-anchor="middle">no structure, no water retention, no life</text>

  <line x1="430" y1="380" x2="430" y2="420" stroke="#64748b" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="230" y="426" width="400" height="64" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="430" y="453" font-size="15" font-weight="600" fill="#94a3b8" text-anchor="middle">PLANTS ADDICTED TO SYNTHETIC INPUTS</text>
  <text x="430" y="475" font-size="11" fill="#64748b" text-anchor="middle">stop paying, and the crop collapses</text>

  <!-- loop back: the subscription -->
  <path d="M 630 458 L 764 458 L 764 128 L 638 128" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#ag)"/>
  <text x="792" y="294" font-size="12" fill="#64748b" text-anchor="middle" transform="rotate(90 792 294)">buy the next bag: the subscription renews</text>

  <text x="430" y="540" font-size="13" fill="#f59e0b" text-anchor="middle">the exit: let Rhizobium and mycorrhizae fix nitrogen at ambient temperature, for sugar</text>
  <text x="430" y="566" font-size="12" fill="#64748b" text-anchor="middle">Haber-Bosch burns ~1-2% of global energy to do what clover roots do for free</text>
</svg>
