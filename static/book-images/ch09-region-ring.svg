<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 632" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <defs>
    <marker id="sa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="898" height="630" rx="12" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="46" font-size="19" letter-spacing="2" fill="#f1f5f9">THE REGION, NOT THE CITY LIMITS</text>
  <line x1="40" y1="60" x2="470" y2="60" stroke="#f59e0b" stroke-width="2"/>
  <text x="40" y="82" font-size="12.5" fill="#94a3b8">A dense core cannot produce everything inside its own limits. The ring around it can.</text>

  <!-- supply arrows (drawn first, behind boxes) -->
  <line x1="450" y1="164" x2="450" y2="266" stroke="#f59e0b" stroke-width="2" marker-end="url(#sa)"/>
  <line x1="450" y1="482" x2="450" y2="356" stroke="#f59e0b" stroke-width="2" marker-end="url(#sa)"/>
  <line x1="272" y1="312" x2="346" y2="312" stroke="#f59e0b" stroke-width="2" marker-end="url(#sa)"/>
  <line x1="628" y1="312" x2="554" y2="312" stroke="#f59e0b" stroke-width="2" marker-end="url(#sa)"/>

  <!-- core -->
  <rect x="350" y="272" width="200" height="80" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="450" y="307" font-size="15" font-weight="600" fill="#f1f5f9" text-anchor="middle">DENSE CITY CORE</text>
  <text x="450" y="327" font-size="11" fill="#94a3b8" text-anchor="middle">high density, low production</text>

  <!-- top: food -->
  <rect x="340" y="98" width="220" height="66" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="126" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="middle">FOOD PRODUCTION</text>
  <text x="450" y="145" font-size="11" fill="#94a3b8" text-anchor="middle">CSA farms, greenhouses, grow towers</text>

  <!-- bottom: factories -->
  <rect x="340" y="482" width="220" height="66" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="510" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="middle">NEIGHBORHOOD FACTORIES</text>
  <text x="450" y="529" font-size="11" fill="#94a3b8" text-anchor="middle">plasma tables, printers, fab labs</text>

  <!-- left: materials -->
  <rect x="48" y="279" width="224" height="66" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="160" y="307" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="middle">MATERIALS RECOVERY</text>
  <text x="160" y="326" font-size="11" fill="#94a3b8" text-anchor="middle">capture the 40% we waste</text>

  <!-- right: energy -->
  <rect x="628" y="279" width="224" height="66" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="740" y="307" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="middle">ENERGY + WATER</text>
  <text x="740" y="326" font-size="11" fill="#94a3b8" text-anchor="middle">solar, storage, microgrids</text>

  <text x="574" y="250" font-size="11" fill="#f59e0b">supply in</text>

  <line x1="40" y1="574" x2="860" y2="574" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="598" font-size="12.5" fill="#94a3b8">The ring builds the capacity, and that is good local work.</text>
  <text x="40" y="617" font-size="12.5" fill="#94a3b8">If the trucks stop, the region still eats. Resilience, not secession.</text>
</svg>
