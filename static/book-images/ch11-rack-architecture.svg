<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <rect x="1" y="1" width="858" height="558" rx="12" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="52" font-size="15" letter-spacing="3" fill="#94a3b8">THE AUTONOMOUS RACK ARCHITECTURE</text>
  <text x="40" y="74" font-size="12" fill="#64748b">a 12V-native compute rack, bottom-fed, salvage-built</text>
  <line x1="40" y1="88" x2="380" y2="88" stroke="#1e293b" stroke-width="2"/>

  <!-- rack outer -->
  <rect x="230" y="110" width="400" height="410" rx="8" fill="#0f172a" stroke="#334155" stroke-width="2.5"/>

  <!-- U1 router -->
  <rect x="250" y="126" width="360" height="42" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="266" y="152" font-size="12" fill="#f1f5f9">U1 · EdgeRouter / managed DC switch (12V)</text>

  <!-- U2 power -->
  <rect x="250" y="176" width="360" height="42" rx="5" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="266" y="202" font-size="12" fill="#f1f5f9">U2 · 24V→12V power distribution + fuse panel</text>

  <!-- compute node -->
  <rect x="250" y="226" width="360" height="180" rx="5" fill="#020617" stroke="#334155" stroke-width="1.5"/>
  <text x="266" y="250" font-size="12" fill="#94a3b8">U4-U8 · headless Proxmox node (dual Xeon / EPYC)</text>
  <rect x="270" y="264" width="320" height="52" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="430" y="294" font-size="12" fill="#f1f5f9" text-anchor="middle">GPU 1 · RTX 3090 / Tesla P40 · 24 GB VRAM</text>
  <rect x="270" y="326" width="320" height="52" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="430" y="356" font-size="12" fill="#f1f5f9" text-anchor="middle">GPU 2 · RTX 3090 / Tesla P40 · 24 GB VRAM</text>

  <!-- pump -->
  <rect x="250" y="414" width="360" height="46" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="266" y="442" font-size="12" fill="#f1f5f9">U9-U12 · coolant pump + reservoir (12V brushless)</text>

  <!-- VRAM callout -->
  <rect x="656" y="240" width="180" height="150" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="746" y="266" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">THE VRAM MATH</text>
  <text x="746" y="292" font-size="11" fill="#94a3b8" text-anchor="middle">V ≈ (P·Q / 8) · 1.2</text>
  <text x="746" y="318" font-size="11" fill="#f1f5f9" text-anchor="middle">8B @ 16-bit → 19 GB</text>
  <text x="746" y="342" font-size="11" fill="#f1f5f9" text-anchor="middle">70B @ 4-bit → 42 GB</text>
  <text x="746" y="368" font-size="11" fill="#94a3b8" text-anchor="middle">2 cards = 48 GB pooled</text>

  <text x="430" y="504" font-size="13" fill="#94a3b8" text-anchor="middle">everything runs native 12V DC off the shell's bus: no inverter, no wall bricks, no meter</text>
</svg>
