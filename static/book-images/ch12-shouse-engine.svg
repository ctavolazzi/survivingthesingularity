<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <defs>
    <marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="858" height="558" rx="12" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="52" font-size="15" letter-spacing="3" fill="#94a3b8">THE SHOUSE THERMODYNAMIC ENGINE</text>
  <line x1="40" y1="66" x2="460" y2="66" stroke="#1e293b" stroke-width="2"/>

  <!-- roofline -->
  <path d="M 120 148 L 430 96 L 740 148" fill="none" stroke="#334155" stroke-width="2.5"/>

  <!-- shop half -->
  <rect x="120" y="148" width="620" height="150" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="430" y="178" font-size="15" font-weight="600" fill="#3b82f6" text-anchor="middle">THE SHOP (50%) · the shield</text>
  <g font-size="12" fill="#94a3b8">
    <text x="160" y="210">- welder + CNC plasma</text>
    <text x="160" y="234">- tool library</text>
    <text x="160" y="258">- local server Crucible</text>
    <text x="470" y="210">- compost heat exchange loop</text>
    <text x="470" y="234">- DC microgrid fuse block</text>
    <text x="470" y="258">- rainwater filtration rack</text>
  </g>

  <!-- shared bus -->
  <rect x="120" y="298" width="620" height="34" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="320" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">SHARED THERMAL + POWER BUS</text>
  <line x1="300" y1="298" x2="300" y2="336" stroke="#f59e0b" stroke-width="2" marker-end="url(#aa)"/>
  <line x1="560" y1="298" x2="560" y2="336" stroke="#f59e0b" stroke-width="2" marker-end="url(#aa)"/>

  <!-- house half -->
  <rect x="120" y="332" width="620" height="150" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="430" y="364" font-size="15" font-weight="600" fill="#f59e0b" text-anchor="middle">THE HOUSE (50%) · the sanctuary</text>
  <g font-size="12" fill="#94a3b8">
    <text x="160" y="396">- highly insulated living</text>
    <text x="160" y="420">- energy-efficient kitchen</text>
    <text x="470" y="396">- universal design wet-room</text>
    <text x="470" y="420">- warm, human sanctuary</text>
  </g>
  <text x="430" y="462" font-size="11" fill="#64748b" text-anchor="middle">server + shop waste heat ducted in all winter: thermal overhead near zero</text>

  <text x="430" y="524" font-size="13" fill="#f1f5f9" text-anchor="middle">half factory, half home, one envelope: a productive node, not a consumption unit</text>
</svg>
