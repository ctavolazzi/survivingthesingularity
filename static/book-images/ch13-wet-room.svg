<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#3b82f6"/>
    </marker>
    <marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="858" height="558" rx="12" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="52" font-size="15" letter-spacing="3" fill="#94a3b8">UNIVERSAL WET-ROOM LAYOUT</text>
  <text x="40" y="74" font-size="12" fill="#64748b">plan view · one sloped basin, one drain, zero thresholds</text>
  <line x1="40" y1="88" x2="440" y2="88" stroke="#1e293b" stroke-width="2"/>

  <!-- 8ft dimension -->
  <line x1="150" y1="122" x2="710" y2="122" stroke="#94a3b8" stroke-width="1.5" marker-start="url(#ab)" marker-end="url(#ab)"/>
  <text x="430" y="114" font-size="13" fill="#94a3b8" text-anchor="middle">8 feet</text>

  <!-- room -->
  <rect x="150" y="140" width="560" height="320" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- whole floor = sloped basin -->
  <text x="410" y="322" font-size="12" fill="#64748b" text-anchor="middle">entire floor: sloped marine ply + waterproof membrane + seamless coating</text>

  <!-- pump -->
  <rect x="178" y="162" width="170" height="54" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="263" y="186" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="middle">DC WATER PUMP</text>
  <text x="263" y="206" font-size="11" fill="#94a3b8" text-anchor="middle">+ filtration stack</text>

  <!-- shower -->
  <line x1="263" y1="216" x2="263" y2="252" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>
  <circle cx="263" cy="270" r="16" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <g stroke="#3b82f6" stroke-width="1.5">
    <line x1="255" y1="282" x2="249" y2="296"/>
    <line x1="263" y1="284" x2="263" y2="298"/>
    <line x1="271" y1="282" x2="277" y2="296"/>
  </g>
  <text x="263" y="316" font-size="12" fill="#94a3b8" text-anchor="middle">shower fixture</text>

  <!-- slope arrows toward drain -->
  <g stroke="#f59e0b" stroke-width="2" opacity="0.85">
    <line x1="330" y1="380" x2="600" y2="400" marker-end="url(#aa)"/>
    <line x1="330" y1="410" x2="600" y2="416" marker-end="url(#aa)"/>
    <line x1="330" y1="440" x2="600" y2="432" marker-end="url(#aa)"/>
  </g>
  <text x="450" y="368" font-size="12" fill="#f59e0b" text-anchor="middle">floor slopes to the drain</text>

  <!-- linear drain -->
  <rect x="646" y="360" width="18" height="88" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <g stroke="#f59e0b" stroke-width="1.5">
    <line x1="650" y1="370" x2="660" y2="370"/>
    <line x1="650" y1="382" x2="660" y2="382"/>
    <line x1="650" y1="394" x2="660" y2="394"/>
    <line x1="650" y1="406" x2="660" y2="406"/>
    <line x1="650" y1="418" x2="660" y2="418"/>
    <line x1="650" y1="430" x2="660" y2="430"/>
    <line x1="650" y1="442" x2="660" y2="442"/>
  </g>
  <text x="655" y="348" font-size="12" fill="#f59e0b" text-anchor="middle">linear drain</text>

  <!-- greywater out -->
  <line x1="664" y1="404" x2="760" y2="404" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#aa)"/>
  <text x="770" y="392" font-size="11" fill="#94a3b8" text-anchor="middle" transform="rotate(90 770 392)">greywater → garden beds</text>

  <!-- blocking note -->
  <line x1="178" y1="404" x2="178" y2="440" stroke="#334155" stroke-width="6"/>
  <text x="196" y="416" font-size="11" fill="#64748b">2×10 blocking at 36" + 48"</text>
  <text x="196" y="432" font-size="11" fill="#64748b">bolt grab bars anywhere, forever</text>

  <text x="430" y="496" font-size="13" fill="#f1f5f9" text-anchor="middle">no lips · no curbs · no doors · walk it, wheel it, or wash it down</text>
  <text x="430" y="522" font-size="12" fill="#64748b" text-anchor="middle">greywater plumbed separate from blackwater: shower runoff feeds the food system</text>
</svg>
