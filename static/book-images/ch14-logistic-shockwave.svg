<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="858" height="618" rx="12" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="52" font-size="15" letter-spacing="3" fill="#94a3b8">THE LOGISTIC SHOCKWAVE</text>
  <text x="40" y="74" font-size="12" fill="#64748b">how a just-in-time buffer collapses in four days</text>
  <line x1="40" y1="88" x2="380" y2="88" stroke="#1e293b" stroke-width="2"/>

  <!-- Day 1 -->
  <text x="132" y="142" font-size="14" font-weight="600" fill="#f59e0b" text-anchor="end">DAY 1</text>
  <rect x="160" y="110" width="480" height="66" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="400" y="138" font-size="16" font-weight="600" fill="#f1f5f9" text-anchor="middle">PORT DISRUPTION / ALGORITHMIC LOCKOUT</text>
  <text x="400" y="160" font-size="12" fill="#94a3b8" text-anchor="middle">one parameter changes upstream</text>

  <line x1="400" y1="176" x2="400" y2="222" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>

  <!-- Day 2 -->
  <text x="132" y="262" font-size="14" font-weight="600" fill="#f59e0b" text-anchor="end">DAY 2</text>
  <rect x="160" y="230" width="480" height="66" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="400" y="258" font-size="16" font-weight="600" fill="#f1f5f9" text-anchor="middle">"ROLLING WAREHOUSES" REROUTED OR PARKED</text>
  <text x="400" y="280" font-size="12" fill="#94a3b8" text-anchor="middle">the trucks were the warehouse; now they are gone</text>

  <line x1="400" y1="296" x2="400" y2="342" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>

  <!-- Day 3 -->
  <text x="132" y="382" font-size="14" font-weight="600" fill="#f59e0b" text-anchor="end">DAY 3</text>
  <rect x="160" y="350" width="480" height="66" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="400" y="378" font-size="16" font-weight="600" fill="#f1f5f9" text-anchor="middle">SUPERMARKET SHELVES STRIPPED CLEAN</text>
  <text x="400" y="400" font-size="12" fill="#94a3b8" text-anchor="middle">three days of stock was the entire buffer</text>

  <line x1="400" y1="416" x2="400" y2="462" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>

  <!-- Day 4 -->
  <text x="132" y="502" font-size="14" font-weight="600" fill="#f59e0b" text-anchor="end">DAY 4</text>
  <rect x="160" y="470" width="480" height="66" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="498" font-size="16" font-weight="600" fill="#f59e0b" text-anchor="middle">SYSTEMIC PANIC &amp; RESOURCE HOARDING</text>
  <text x="400" y="520" font-size="12" fill="#94a3b8" text-anchor="middle">the crowd discovers the buffer never existed</text>

  <!-- side gauge -->
  <rect x="700" y="110" width="26" height="426" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <rect x="700" y="110" width="26" height="106" rx="6" fill="#3b82f6" opacity="0.85"/>
  <rect x="700" y="216" width="26" height="106" fill="#3b82f6" opacity="0.5"/>
  <rect x="700" y="322" width="26" height="106" fill="#3b82f6" opacity="0.22"/>
  <text x="770" y="118" font-size="11" fill="#94a3b8" text-anchor="middle" transform="rotate(90 770 118)">local food buffer draining →</text>

  <text x="430" y="586" font-size="13" fill="#f1f5f9" text-anchor="middle">efficiency stripped every buffer out; you are always 72 hours from empty</text>
</svg>
