<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 640" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <defs>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#64748b"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="858" height="638" rx="12" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="52" font-size="15" letter-spacing="3" fill="#94a3b8">THE COOPERATIVE LAND TRUST FIREWALL</text>
  <line x1="40" y1="66" x2="470" y2="66" stroke="#1e293b" stroke-width="2"/>

  <!-- attacker -->
  <rect x="230" y="92" width="400" height="60" rx="10" fill="#0f172a" stroke="#475569" stroke-width="2"/>
  <text x="430" y="118" font-size="15" font-weight="600" fill="#94a3b8" text-anchor="middle">SPECULATIVE REAL ESTATE MARKET</text>
  <text x="430" y="140" font-size="12" fill="#64748b" text-anchor="middle">algorithmic buyers · foreclosure scripts · tax auctions</text>

  <!-- attack arrow -->
  <line x1="430" y1="152" x2="430" y2="208" stroke="#64748b" stroke-width="3" marker-end="url(#ag)"/>
  <text x="450" y="186" font-size="12" fill="#64748b">attempts to buy / foreclose</text>

  <!-- firewall -->
  <rect x="150" y="214" width="560" height="16" rx="8" fill="#f59e0b"/>
  <text x="430" y="252" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">BLOCKED BY LEGAL SHIELD</text>

  <!-- CLT container -->
  <rect x="150" y="270" width="560" height="320" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="430" y="302" font-size="16" font-weight="600" fill="#3b82f6" text-anchor="middle">COMMUNITY LAND TRUST (CLT)</text>

  <!-- land box -->
  <rect x="190" y="322" width="480" height="96" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="430" y="350" font-size="15" font-weight="600" fill="#f1f5f9" text-anchor="middle">THE LAND · held in perpetuity</text>
  <text x="430" y="374" font-size="12" fill="#94a3b8" text-anchor="middle">removed from market speculation forever</text>
  <text x="430" y="394" font-size="12" fill="#94a3b8" text-anchor="middle">tax-sheltered via easements + agricultural classification</text>

  <!-- lease arrow -->
  <line x1="430" y1="418" x2="430" y2="464" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>
  <text x="450" y="446" font-size="12" fill="#94a3b8">99-year ground lease</text>

  <!-- stewardship box -->
  <rect x="190" y="470" width="480" height="96" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="498" font-size="15" font-weight="600" fill="#f1f5f9" text-anchor="middle">THE STEWARDSHIP · housing, farms, greenhouses</text>
  <text x="430" y="522" font-size="12" fill="#94a3b8" text-anchor="middle">owned by community members, inheritable</text>
  <text x="430" y="542" font-size="12" fill="#94a3b8" text-anchor="middle">resale by formula: permanently affordable</text>

  <text x="430" y="616" font-size="12" fill="#64748b" text-anchor="middle">split the title: the market can no longer reach the dirt</text>
</svg>
