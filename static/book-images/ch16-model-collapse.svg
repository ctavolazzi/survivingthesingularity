<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#3b82f6"/>
    </marker>
    <marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="858" height="618" rx="12" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="52" font-size="15" letter-spacing="3" fill="#94a3b8">THE SPIRAL OF MODEL COLLAPSE</text>
  <line x1="40" y1="66" x2="420" y2="66" stroke="#1e293b" stroke-width="2"/>

  <!-- top node: human data -->
  <rect x="270" y="96" width="320" height="72" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="430" y="126" font-size="15" font-weight="600" fill="#f59e0b" text-anchor="middle">HIGH-QUALITY HUMAN DATA</text>
  <text x="430" y="150" font-size="12" fill="#94a3b8" text-anchor="middle">rare, expensive, and getting rarer</text>

  <!-- right node: models train -->
  <rect x="540" y="270" width="280" height="72" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="680" y="300" font-size="15" font-weight="600" fill="#f1f5f9" text-anchor="middle">AI MODELS TRAIN</text>
  <text x="680" y="324" font-size="12" fill="#94a3b8" text-anchor="middle">and generate at industrial scale</text>

  <!-- bottom node: slop floods web -->
  <rect x="270" y="444" width="320" height="72" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="430" y="474" font-size="15" font-weight="600" fill="#f1f5f9" text-anchor="middle">WEB FLOODS WITH SLOP</text>
  <text x="430" y="498" font-size="12" fill="#94a3b8" text-anchor="middle">synthetic output drowns the archive</text>

  <!-- left node: trains on own slop -->
  <rect x="40" y="270" width="280" height="72" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="180" y="300" font-size="15" font-weight="600" fill="#94a3b8" text-anchor="middle">AI TRAINS ON ITS OWN SLOP</text>
  <text x="180" y="324" font-size="12" fill="#64748b" text-anchor="middle">errors compound, weights drift</text>

  <!-- cycle arrows clockwise -->
  <path d="M 560 150 Q 680 180 685 262" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>
  <path d="M 672 350 Q 640 440 598 466" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>
  <path d="M 262 466 Q 220 440 186 350" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>
  <path d="M 174 262 Q 180 180 262 148" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#ab)"/>
  <text x="176" y="200" font-size="11" fill="#64748b" text-anchor="middle">degrades without</text>
  <text x="176" y="216" font-size="11" fill="#64748b" text-anchor="middle">fresh human input</text>

  <!-- center -->
  <text x="430" y="292" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="middle">EVERY LAP:</text>
  <text x="430" y="316" font-size="13" fill="#94a3b8" text-anchor="middle">less variance, more mush</text>
  <text x="430" y="338" font-size="13" fill="#94a3b8" text-anchor="middle">a copy of a copy of a copy</text>

  <text x="430" y="566" font-size="13" fill="#f59e0b" text-anchor="middle">the machine cannot survive without fresh human data · that is your leverage</text>
</svg>
