<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <defs>
    <marker id="bb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#3b82f6"/>
    </marker>
    <marker id="bg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="858" height="598" rx="12" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="52" font-size="15" letter-spacing="3" fill="#94a3b8">CLOSING THE LOOP: THE ALGAE FISH-FOOD CYCLE</text>
  <line x1="40" y1="66" x2="612" y2="66" stroke="#1e293b" stroke-width="2"/>

  <!-- TOP: fish -->
  <rect x="330" y="100" width="200" height="70" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="430" y="130" font-size="18" font-weight="600" fill="#f1f5f9" text-anchor="middle">FISH TANK</text>
  <text x="430" y="152" font-size="13" fill="#94a3b8" text-anchor="middle">waste becomes nitrates</text>

  <!-- RIGHT: plants -->
  <rect x="600" y="255" width="210" height="90" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="705" y="285" font-size="18" font-weight="600" fill="#f1f5f9" text-anchor="middle">GROW BEDS</text>
  <text x="705" y="307" font-size="13" fill="#94a3b8" text-anchor="middle">plants clean the water,</text>
  <text x="705" y="325" font-size="13" fill="#94a3b8" text-anchor="middle">feed the household</text>

  <!-- BOTTOM: dry + grind -->
  <rect x="330" y="440" width="200" height="70" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="430" y="470" font-size="18" font-weight="600" fill="#f1f5f9" text-anchor="middle">DRY + GRIND</text>
  <text x="430" y="492" font-size="13" fill="#94a3b8" text-anchor="middle">8 g/week into pellets</text>

  <!-- LEFT: photobioreactor (the innovation, amber) -->
  <rect x="50" y="255" width="210" height="90" rx="10" fill="#1a1005" stroke="#f59e0b" stroke-width="2"/>
  <text x="155" y="283" font-size="17" font-weight="600" fill="#f59e0b" text-anchor="middle">PHOTOBIOREACTOR</text>
  <text x="155" y="305" font-size="13" fill="#94a3b8" text-anchor="middle">algae grown on light,</text>
  <text x="155" y="323" font-size="13" fill="#94a3b8" text-anchor="middle">water, a $400 printer</text>

  <!-- edges clockwise -->
  <path d="M 530 140 Q 705 150 705 253" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#bb)"/>
  <text x="648" y="180" font-size="12.5" fill="#94a3b8">nitrate-rich water</text>

  <path d="M 705 345 Q 705 475 532 475" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#bb)"/>
  <text x="600" y="452" font-size="12.5" fill="#94a3b8" text-anchor="middle">harvested algae</text>

  <path d="M 330 475 Q 155 475 155 347" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#bb)"/>
  <text x="212" y="452" font-size="12.5" fill="#94a3b8" text-anchor="middle">dried protein</text>

  <!-- the closing edge (amber): fish food back to the fish -->
  <path d="M 155 253 Q 155 135 328 135" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#bg)"/>
  <text x="212" y="180" font-size="12.5" fill="#f59e0b" text-anchor="middle">fish food, made not bought</text>

  <!-- center note -->
  <text x="430" y="292" font-size="13" fill="#94a3b8" text-anchor="middle">the store-bought</text>
  <text x="430" y="312" font-size="13" fill="#94a3b8" text-anchor="middle">input is gone;</text>
  <text x="430" y="332" font-size="13" font-weight="600" fill="#f1f5f9" text-anchor="middle">the loop is closed</text>
</svg>
