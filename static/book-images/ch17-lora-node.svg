<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#3b82f6"/>
    </marker>
    <marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0L10,5L0,10z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="858" height="618" rx="12" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="52" font-size="15" letter-spacing="3" fill="#94a3b8">ANATOMY OF AN INDEPENDENT MESH NODE</text>
  <line x1="40" y1="66" x2="470" y2="66" stroke="#1e293b" stroke-width="2"/>

  <!-- pelican box -->
  <rect x="150" y="110" width="420" height="450" rx="16" fill="#0f172a" stroke="#94a3b8" stroke-width="3"/>
  <rect x="150" y="110" width="420" height="34" rx="16" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="196" cy="127" r="6" fill="#475569"/>
  <circle cx="524" cy="127" r="6" fill="#475569"/>
  <text x="360" y="132" font-size="12" fill="#94a3b8" text-anchor="middle">WATERPROOF PELICAN / AMMO BOX</text>

  <!-- solar panel -->
  <rect x="200" y="170" width="320" height="86" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <g stroke="#3b82f6" stroke-width="1" opacity="0.6">
    <line x1="264" y1="172" x2="264" y2="254"/>
    <line x1="328" y1="172" x2="328" y2="254"/>
    <line x1="392" y1="172" x2="392" y2="254"/>
    <line x1="456" y1="172" x2="456" y2="254"/>
    <line x1="202" y1="213" x2="518" y2="213"/>
  </g>
  <text x="360" y="204" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="middle">5W SOLAR PV PANEL</text>
  <text x="360" y="240" font-size="11" fill="#94a3b8" text-anchor="middle">paperback-sized, roof of the case</text>

  <line x1="360" y1="256" x2="360" y2="296" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>
  <text x="378" y="282" font-size="11" fill="#64748b">5V charge regulator</text>

  <!-- batteries -->
  <rect x="200" y="302" width="320" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="226" y="322" width="120" height="40" rx="20" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <rect x="346" y="336" width="8" height="12" fill="#f59e0b"/>
  <rect x="380" y="322" width="120" height="40" rx="20" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <rect x="500" y="336" width="8" height="12" fill="#f59e0b"/>
  <text x="286" y="347" font-size="11" fill="#f59e0b" text-anchor="middle">18650</text>
  <text x="440" y="347" font-size="11" fill="#f59e0b" text-anchor="middle">18650</text>

  <line x1="360" y1="382" x2="360" y2="422" stroke="#3b82f6" stroke-width="2" marker-end="url(#ab)"/>
  <text x="378" y="408" font-size="11" fill="#64748b">salvaged laptop cells</text>

  <!-- esp32 -->
  <rect x="200" y="428" width="320" height="86" rx="8" fill="#020617" stroke="#f59e0b" stroke-width="2.5"/>
  <g fill="#f59e0b" opacity="0.8">
    <rect x="212" y="440" width="6" height="10"/><rect x="212" y="456" width="6" height="10"/>
    <rect x="212" y="472" width="6" height="10"/><rect x="212" y="488" width="6" height="10"/>
    <rect x="502" y="440" width="6" height="10"/><rect x="502" y="456" width="6" height="10"/>
    <rect x="502" y="472" width="6" height="10"/><rect x="502" y="488" width="6" height="10"/>
  </g>
  <text x="360" y="466" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="middle">ESP32 / HELTEC LORA CHIP</text>
  <text x="360" y="492" font-size="11" fill="#94a3b8" text-anchor="middle">Meshtastic firmware · under 0.1 W idle</text>

  <!-- antenna out -->
  <line x1="570" y1="470" x2="660" y2="470" stroke="#f59e0b" stroke-width="2.5"/>
  <line x1="660" y1="470" x2="660" y2="240" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="660" cy="228" r="6" fill="#f59e0b"/>
  <path d="M 640 210 a 28 28 0 0 1 40 0" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <path d="M 628 196 a 45 45 0 0 1 64 0" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <path d="M 616 182 a 62 62 0 0 1 88 0" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.35"/>
  <text x="672" y="300" font-size="11" fill="#94a3b8">tuned high-gain</text>
  <text x="672" y="318" font-size="11" fill="#94a3b8">antenna, elevated</text>

  <line x1="700" y1="228" x2="790" y2="228" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#aa)"/>
  <text x="746" y="212" font-size="11" fill="#f59e0b" text-anchor="middle">915 / 868 MHz</text>
  <text x="746" y="252" font-size="11" fill="#94a3b8" text-anchor="middle">to next node</text>

  <text x="430" y="596" font-size="12" fill="#64748b" text-anchor="middle">license-free ISM bands · runs forever on sun · thirty-mile reach with line-of-sight</text>
</svg>
