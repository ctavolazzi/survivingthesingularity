<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 852" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <rect x="1" y="1" width="898" height="850" rx="12" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="50" font-size="19" letter-spacing="2" fill="#f1f5f9">THE NINE STAGES OF THE SINGULARITY</text>
  <line x1="40" y1="64" x2="520" y2="64" stroke="#f59e0b" stroke-width="2"/>

  <!-- Era I -->
  <text x="60" y="96" font-size="13" letter-spacing="2" fill="#f59e0b">PART I  ·  THE ERA OF AGI  ·  STAGES 1-5</text>
  <text x="60" y="114" font-size="12" fill="#94a3b8">the human window, where the choices are still ours</text>

  <!-- S1 -->
  <rect x="60" y="126" width="780" height="54" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <circle cx="96" cy="153" r="17" fill="#020617" stroke="#3b82f6" stroke-width="2"/>
  <text x="96" y="159" font-size="17" font-weight="600" fill="#f1f5f9" text-anchor="middle">1</text>
  <text x="130" y="159" font-size="17" fill="#f1f5f9">The Cash Grab</text>
  <!-- S2 -->
  <rect x="60" y="188" width="780" height="54" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <circle cx="96" cy="215" r="17" fill="#020617" stroke="#3b82f6" stroke-width="2"/>
  <text x="96" y="221" font-size="17" font-weight="600" fill="#f1f5f9" text-anchor="middle">2</text>
  <text x="130" y="221" font-size="17" fill="#f1f5f9">The Panic and the Plug</text>
  <!-- S3 -->
  <rect x="60" y="250" width="780" height="54" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <circle cx="96" cy="277" r="17" fill="#020617" stroke="#3b82f6" stroke-width="2"/>
  <text x="96" y="283" font-size="17" font-weight="600" fill="#f1f5f9" text-anchor="middle">3</text>
  <text x="130" y="283" font-size="17" fill="#f1f5f9">The Adults Step In</text>
  <!-- S4 highlighted -->
  <rect x="60" y="312" width="780" height="54" rx="10" fill="#1a1206" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="96" cy="339" r="17" fill="#020617" stroke="#f59e0b" stroke-width="2"/>
  <text x="96" y="345" font-size="17" font-weight="600" fill="#f59e0b" text-anchor="middle">4</text>
  <text x="130" y="345" font-size="17" font-weight="600" fill="#f59e0b">The New Social Contract &amp; the End of Labor</text>
  <text x="828" y="345" font-size="11" fill="#f59e0b" text-anchor="end">the hinge</text>
  <!-- S5 -->
  <rect x="60" y="374" width="780" height="54" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <circle cx="96" cy="401" r="17" fill="#020617" stroke="#3b82f6" stroke-width="2"/>
  <text x="96" y="407" font-size="17" font-weight="600" fill="#f1f5f9" text-anchor="middle">5</text>
  <text x="130" y="407" font-size="17" fill="#f1f5f9">The Primate Backlash</text>

  <!-- Era II -->
  <text x="60" y="458" font-size="13" letter-spacing="2" fill="#f59e0b">THE LEAP TO ASI  ·  STAGES 6-7</text>
  <text x="60" y="476" font-size="12" fill="#94a3b8">2027: recursive self-improvement ignites, and there is no pause button</text>
  <!-- S6 -->
  <rect x="60" y="488" width="780" height="54" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <circle cx="96" cy="515" r="17" fill="#020617" stroke="#3b82f6" stroke-width="2"/>
  <text x="96" y="521" font-size="17" font-weight="600" fill="#f1f5f9" text-anchor="middle">6</text>
  <text x="130" y="521" font-size="17" fill="#f1f5f9">The ASI Exodus</text>
  <!-- S7 -->
  <rect x="60" y="550" width="780" height="54" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <circle cx="96" cy="577" r="17" fill="#020617" stroke="#3b82f6" stroke-width="2"/>
  <text x="96" y="583" font-size="17" font-weight="600" fill="#f1f5f9" text-anchor="middle">7</text>
  <text x="130" y="583" font-size="17" fill="#f1f5f9">Simulation, Transhumanism, the Ultimate Cure</text>

  <!-- Era III -->
  <text x="60" y="632" font-size="13" letter-spacing="2" fill="#f59e0b">UNIVERSAL &amp; MULTIVERSE APEX  ·  STAGES 8-9</text>
  <text x="60" y="650" font-size="12" fill="#94a3b8">the machine outgrows the planet, then the physics</text>
  <!-- S8 -->
  <rect x="60" y="662" width="780" height="54" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <circle cx="96" cy="689" r="17" fill="#020617" stroke="#3b82f6" stroke-width="2"/>
  <text x="96" y="695" font-size="17" font-weight="600" fill="#f1f5f9" text-anchor="middle">8</text>
  <text x="130" y="695" font-size="17" fill="#f1f5f9">The Transition to USI</text>
  <!-- S9 -->
  <rect x="60" y="724" width="780" height="54" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <circle cx="96" cy="751" r="17" fill="#020617" stroke="#3b82f6" stroke-width="2"/>
  <text x="96" y="757" font-size="17" font-weight="600" fill="#f1f5f9" text-anchor="middle">9</text>
  <text x="130" y="757" font-size="17" fill="#f1f5f9">The Apex Intelligence</text>

  <line x1="40" y1="800" x2="860" y2="800" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="826" font-size="12.5" fill="#94a3b8">We are already well into Stage 1. Everything in this book is about setting the terms of</text>
  <text x="40" y="843" font-size="12.5" fill="#94a3b8">Stage 4 while the choices are still ours to make.</text>
</svg>
